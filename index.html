<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0f1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FuelTrack</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><text y='70' x='50' text-anchor='middle' font-size='55'>⛽</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1a;font-family:'DM Sans',sans-serif;color:#f1f5f9;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
input:focus{border-color:rgba(34,211,238,0.4)!important;outline:none}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.mono{font-family:'JetBrains Mono',monospace}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:10px}
.bar-label{width:55px;text-align:right;color:rgba(255,255,255,0.35);flex-shrink:0;overflow:hidden;white-space:nowrap}
.bar-track{flex:1;height:20px;background:rgba(255,255,255,0.03);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width 0.5s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:700;color:#0a0f1a;min-width:fit-content}
.bar-val{width:40px;text-align:right;color:rgba(255,255,255,0.5);flex-shrink:0;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const SK="fuel-tracker-entries";
const SEED=[
{id:"h01",date:"2025-01-04",km:5110,total:39.37,ppl:1.899},{id:"h02",date:"2025-01-18",km:5406,total:38.06,ppl:1.929},
{id:"h03",date:"2025-01-29",km:5767,total:49.09,ppl:1.919},{id:"h04",date:"2025-02-08",km:6181,total:41.11,ppl:1.989},
{id:"h05",date:"2025-02-19",km:6646,total:52.12,ppl:1.929},{id:"h06",date:"2025-03-05",km:7115,total:52.20,ppl:1.899},
{id:"h07",date:"2025-03-18",km:7694,total:52.19,ppl:1.819},{id:"h08",date:"2025-03-29",km:7941,total:28.02,ppl:1.879},
{id:"h09",date:"2025-04-06",km:8292,total:33.73,ppl:1.801},{id:"h10",date:"2025-04-13",km:8559,total:25.73,ppl:1.799},
{id:"h11",date:"2025-04-20",km:8868,total:32.29,ppl:1.789},{id:"h12",date:"2025-05-03",km:9188,total:31.80,ppl:1.809},
{id:"h13",date:"2025-05-04",km:9594,total:34.04,ppl:1.769},{id:"h14",date:"2025-05-14",km:10088,total:46.03,ppl:1.839},
{id:"h15",date:"2025-05-25",km:10573,total:47.94,ppl:1.799},{id:"h16",date:"2025-06-04",km:10863,total:27.68,ppl:1.879},
{id:"h17",date:"2025-06-15",km:11220,total:33.36,ppl:1.849},{id:"h18",date:"2025-06-17",km:11719,total:46.91,ppl:1.789},
{id:"h19",date:"2025-06-17",km:12264,total:58.10,ppl:1.879},{id:"h20",date:"2025-06-18",km:12712,total:38.34,ppl:1.559},
{id:"h21",date:"2025-07-01",km:13010,total:32.05,ppl:1.579},{id:"h22",date:"2025-07-02",km:13262,total:29.24,ppl:1.929},
{id:"h23",date:"2025-07-03",km:13806,total:60.11,ppl:1.869},{id:"h24",date:"2025-07-03",km:14106,total:25.93,ppl:1.442},
{id:"h25",date:"2025-07-06",km:14456,total:28.07,ppl:1.819},{id:"h26",date:"2025-07-27",km:14871,total:40.26,ppl:1.799},
{id:"h27",date:"2025-08-03",km:15224,total:33.18,ppl:1.839},{id:"h28",date:"2025-08-16",km:15722,total:45.61,ppl:1.849},
{id:"h29",date:"2025-08-31",km:16041,total:33.80,ppl:1.849},{id:"h30",date:"2025-09-07",km:16381,total:32.96,ppl:1.859},
{id:"h31",date:"2025-09-26",km:17005,total:57.16,ppl:1.899},{id:"h32",date:"2025-10-20",km:17834,total:31.00,ppl:1.929},
{id:"h33",date:"2025-10-31",km:18291,total:45.19,ppl:1.959},{id:"h34",date:"2025-11-08",km:18614,total:32.87,ppl:1.899},
{id:"h35",date:"2025-11-23",km:18976,total:41.54,ppl:1.889},{id:"h36",date:"2025-12-07",km:19262,total:30.73,ppl:1.849},
{id:"h37",date:"2025-12-20",km:19757,total:47.89,ppl:1.859},{id:"h38",date:"2025-12-30",km:20238,total:52.13,ppl:1.859},
{id:"h39",date:"2026-01-21",km:20577,total:44.58,ppl:1.956},{id:"h40",date:"2026-02-04",km:20887,total:41.67,ppl:2.009},
{id:"h41",date:"2026-02-15",km:21255,total:40.23,ppl:1.979},{id:"h42",date:"2026-02-28",km:21618,total:43.83,ppl:2.049},
{id:"h43",date:"2026-03-14",km:22079,total:53.17,ppl:2.189},{id:"h44",date:"2026-03-21",km:22386,total:37.52,ppl:2.329},
{id:"h45",date:"2026-04-01",km:22892,total:63.77,ppl:2.289}];

const fD=d=>new Date(d).toLocaleDateString("nl-NL",{day:"2-digit",month:"short"});
const fDY=d=>new Date(d).toLocaleDateString("nl-NL",{day:"2-digit",month:"short",year:"numeric"});
const fN=(n,dec=2)=>(n==null||isNaN(n))?"\u2013":n.toLocaleString("nl-NL",{minimumFractionDigits:dec,maximumFractionDigits:dec});

function BarChart({data,dataKey,color,label,minDomain}){
const vals=data.map(d=>d[dataKey]);
const mn=minDomain||Math.min(...vals)*0.85;
const mx=Math.max(...vals)*1.05;
const recent=data.slice(-15);
return(<div style={{background:"linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"14px 12px",marginBottom:20}}>
<div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.5)",marginBottom:12,letterSpacing:0.5}}>{label}</div>
{recent.map((d,i)=>{const pct=mx>mn?((d[dataKey]-mn)/(mx-mn))*100:50;
return(<div key={i} className="bar-row">
<div className="bar-label">{d.date}</div>
<div className="bar-track"><div className="bar-fill" style={{width:Math.max(pct,8)+"%",background:color}}></div></div>
<div className="bar-val mono">{fN(d[dataKey],dataKey.includes("km")&&!dataKey.includes("/")?0:dataKey.includes("/l")?3:1)}</div>
</div>);})}
</div>);
}

function App(){
const[entries,setEntries]=useState([]);
const[tab,setTab]=useState("dashboard");
const[editId,setEditId]=useState(null);
const[form,setForm]=useState({date:new Date().toISOString().split("T")[0],km:"",total:"",ppl:""});
const[delC,setDelC]=useState(null);
const[toast,setToast]=useState(null);

useEffect(()=>{
try{const s=localStorage.getItem(SK);if(s){const p=JSON.parse(s);if(p.length>0){setEntries(p);return;}}}catch(e){}
setEntries(SEED);try{localStorage.setItem(SK,JSON.stringify(SEED))}catch(e){}
},[]);

const save=useCallback(ne=>{setEntries(ne);try{localStorage.setItem(SK,JSON.stringify(ne))}catch(e){}},[]);
const msg=m=>{setToast(m);setTimeout(()=>setToast(null),2500)};
const rf=()=>setForm({date:new Date().toISOString().split("T")[0],km:"",total:"",ppl:""});

const sorted=[...entries].sort((a,b)=>a.km-b.km);
const computed=sorted.map((e,i)=>{
const liters=e.total/e.ppl;const prev=i>0?sorted[i-1].km:null;
const kmD=prev!=null?e.km-prev:null;const kpl=kmD!=null&&liters>0?kmD/liters:null;
const cpk=kmD!=null&&kmD>0?e.total/kmD:null;
return{...e,liters,kmD,kpl,cpk};});
const ws=computed.filter(e=>e.kpl!=null);

const st={
totKm:sorted.length>=2?sorted[sorted.length-1].km-sorted[0].km:0,
totCost:entries.reduce((s,e)=>s+e.total,0),
totL:computed.reduce((s,e)=>s+e.liters,0),
avgKpl:ws.length>0?ws.reduce((s,e)=>s+e.kpl,0)/ws.length:null,
avgCpk:ws.length>0?ws.reduce((s,e)=>s+e.cpk,0)/ws.length:null,
avgLp100:ws.length>0?ws.reduce((s,e)=>s+(100/e.kpl),0)/ws.length:null};

const cd=ws.map(e=>({date:fD(e.date),"km/l":Math.round(e.kpl*10)/10,"\u20ac/km":Math.round(e.cpk*1000)/1000,"\u20ac/l":e.ppl}));

const submit=()=>{
const km=parseFloat(form.km),total=parseFloat(form.total),ppl=parseFloat(form.ppl);
if(!form.date||isNaN(km)||isNaN(total)||isNaN(ppl)||ppl<=0){msg("Vul alle velden in");return;}
const entry={id:editId||Date.now().toString(),date:form.date,km,total,ppl};
if(editId){save(entries.map(e=>e.id===editId?entry:e));msg("Bijgewerkt \u2713")}
else{save([...entries,entry]);msg("Opgeslagen \u2713")}
rf();setEditId(null);setTab("dashboard");};

const csv=()=>{
const h="Datum;Km;Totaal;Prijs/l;Liters;Km gereden;Km/l;Euro/km\n";
const r=computed.map(e=>[e.date,e.km,fN(e.total),fN(e.ppl,3),fN(e.liters,1),e.kmD!=null?e.kmD:"",e.kpl?fN(e.kpl,1):"",e.cpk?fN(e.cpk,3):""].join(";")).join("\n");
const b=new Blob([h+r],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);
a.download="brandstof-"+new Date().toISOString().split("T")[0]+".csv";a.click();msg("CSV ge\u00ebxporteerd \u2713");};

const iS={width:"100%",padding:"14px 16px",background:"rgba(15,23,42,0.8)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,color:"#f1f5f9",fontSize:16,fontFamily:"'JetBrains Mono',monospace",outline:"none",boxSizing:"border-box"};

const card=(color,label,value,unit)=>(<div style={{background:"linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"14px 16px"}}>
<div style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{label}</div>
<div style={{display:"flex",alignItems:"baseline",gap:4}}>
<span className="mono" style={{fontSize:24,fontWeight:800,color}}>{value}</span>
<span style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{unit}</span></div></div>);

return(
<div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0a0f1a,#0f172a,#0a0f1a)",maxWidth:480,margin:"0 auto",paddingBottom:80}}>

{toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"rgba(15,23,42,0.95)",border:"1px solid rgba(34,211,238,0.3)",borderRadius:12,padding:"12px 24px",zIndex:100,fontSize:14,fontWeight:600,color:"#22d3ee",animation:"fadeIn 0.2s"}}>{toast}</div>}

<div style={{padding:"20px 20px 12px",position:"sticky",top:0,zIndex:50,background:"rgba(10,15,26,0.95)",backdropFilter:"blur(10px)"}}>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<div style={{width:36,height:36,borderRadius:11,background:"linear-gradient(135deg,#22d3ee,#0ea5e9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⛽</div>
<div><div style={{fontSize:18,fontWeight:800}}>FuelTrack</div>
<div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:1}}>{entries.length} TANKBEURTEN</div></div></div>
{entries.length>0&&<button onClick={csv} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"8px 14px",cursor:"pointer",color:"rgba(255,255,255,0.5)",fontSize:11,fontWeight:600}}>CSV \u2193</button>}
</div></div>

<div style={{padding:"0 20px 20px"}}>

{tab==="dashboard"&&<div style={{animation:"fadeIn 0.3s"}}>
{entries.length===0?
<div style={{textAlign:"center",padding:"60px 20px"}}>
<div style={{fontSize:48,marginBottom:16}}>⛽</div>
<div style={{fontSize:20,fontWeight:700,marginBottom:8}}>Welkom bij FuelTrack</div>
<div style={{color:"rgba(255,255,255,0.4)",marginBottom:24}}>Registreer je eerste tankbeurt</div>
<button onClick={()=>setTab("add")} style={{background:"linear-gradient(135deg,#22d3ee,#0ea5e9)",border:"none",borderRadius:14,padding:"14px 28px",color:"#0a0f1a",fontSize:15,fontWeight:700,cursor:"pointer"}}>+ Eerste tankbeurt</button></div>
:<>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
{card("#22d3ee","Gem. km/l",st.avgKpl?fN(st.avgKpl,1):"\u2013","km/l")}
{card("#a78bfa","Gem. \u20ac/km",st.avgCpk?fN(st.avgCpk,3):"\u2013","\u20ac/km")}
{card("#f472b6","Verbruik",st.avgLp100?fN(st.avgLp100,1):"\u2013","l/100km")}
{card("#38bdf8","1 op",st.avgKpl?fN(st.avgKpl,1):"\u2013","km")}
{card("#4ade80","Totaal km",st.totKm>0?fN(st.totKm,0):"\u2013","km")}
{card("#fb923c","Totaal liter",fN(st.totL,0),"L")}
</div>

<div style={{background:"linear-gradient(135deg,rgba(34,211,238,0.12),rgba(139,92,246,0.08))",border:"1px solid rgba(34,211,238,0.15)",borderRadius:16,padding:"16px 20px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{fontSize:13,color:"rgba(255,255,255,0.5)",fontWeight:600}}>Totaal uitgegeven</span>
<span className="mono" style={{fontSize:24,fontWeight:800}}>{"\u20ac"}{fN(st.totCost)}</span></div>

{cd.length>=2&&<>
<BarChart data={cd} dataKey="km/l" color="#22d3ee" label="VERBRUIK (KM/L)"/>
<BarChart data={cd} dataKey={"\u20ac/km"} color="#a78bfa" label="KOSTEN (\u20ac/KM)"/>
<BarChart data={cd} dataKey={"\u20ac/l"} color="#fb923c" label="BRANDSTOFPRIJS (\u20ac/L)"/>
</>}
</>}
</div>}

{tab==="add"&&<div style={{animation:"slideUp 0.3s"}}>
<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
{editId&&<button onClick={()=>{setEditId(null);rf();setTab("history")}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.4)",fontSize:22}}>{"\u2190"}</button>}
<div style={{fontSize:20,fontWeight:800}}>{editId?"Bewerken":"Nieuwe tankbeurt"}</div></div>
<div style={{display:"flex",flexDirection:"column",gap:16}}>
<div><label style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.4)",marginBottom:6,display:"block"}}>DATUM</label>
<input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.4)",marginBottom:6,display:"block"}}>KILOMETERSTAND</label>
<input type="number" inputMode="numeric" placeholder="bijv. 45230" value={form.km} onChange={e=>setForm({...form,km:e.target.value})} style={iS}/></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.4)",marginBottom:6,display:"block"}}>TOTAAL ({"\u20ac"})</label>
<input type="number" inputMode="decimal" step="0.01" placeholder="65.00" value={form.total} onChange={e=>setForm({...form,total:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.4)",marginBottom:6,display:"block"}}>PRIJS/LITER ({"\u20ac"})</label>
<input type="number" inputMode="decimal" step="0.001" placeholder="1.899" value={form.ppl} onChange={e=>setForm({...form,ppl:e.target.value})} style={iS}/></div></div>
{form.total&&form.ppl&&parseFloat(form.ppl)>0&&
<div style={{background:"rgba(34,211,238,0.06)",border:"1px solid rgba(34,211,238,0.15)",borderRadius:12,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{color:"rgba(255,255,255,0.5)"}}>Berekende liters</span>
<span className="mono" style={{fontSize:20,fontWeight:800,color:"#22d3ee"}}>{fN(parseFloat(form.total)/parseFloat(form.ppl),1)} L</span></div>}
<button onClick={submit} style={{background:"linear-gradient(135deg,#22d3ee,#0ea5e9)",border:"none",borderRadius:14,padding:"16px",color:"#0a0f1a",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:8,width:"100%"}}>{editId?"Opslaan":"Tankbeurt registreren"}</button>
</div></div>}

{tab==="history"&&<div style={{animation:"fadeIn 0.3s"}}>
<div style={{fontSize:20,fontWeight:800,marginBottom:20}}>Geschiedenis</div>
{computed.length===0?<div style={{textAlign:"center",padding:"40px",color:"rgba(255,255,255,0.3)"}}>Nog geen tankbeurten</div>
:<div style={{display:"flex",flexDirection:"column",gap:10}}>
{[...computed].reverse().map(e=>(
<div key={e.id} style={{background:"linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"16px 18px"}}>
{delC===e.id?
<div style={{display:"flex",flexDirection:"column",gap:12,alignItems:"center",padding:"8px 0"}}>
<span style={{color:"rgba(255,255,255,0.6)"}}>Verwijderen?</span>
<div style={{display:"flex",gap:10}}>
<button onClick={()=>{save(entries.filter(x=>x.id!==e.id));setDelC(null);msg("Verwijderd \u2713")}} style={{background:"#ef4444",border:"none",borderRadius:10,padding:"10px 24px",color:"#fff",fontWeight:700,cursor:"pointer"}}>Ja</button>
<button onClick={()=>setDelC(null)} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,padding:"10px 24px",color:"rgba(255,255,255,0.6)",cursor:"pointer"}}>Nee</button></div></div>
:<>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
<div><div style={{fontSize:15,fontWeight:700}}>{fDY(e.date)}</div>
<div className="mono" style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:2}}>{e.km.toLocaleString("nl-NL")} km</div></div>
<div style={{display:"flex",gap:6}}>
<button onClick={()=>{setForm({date:e.date,km:""+e.km,total:""+e.total,ppl:""+e.ppl});setEditId(e.id);setTab("add")}} style={{background:"rgba(255,255,255,0.05)",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:"rgba(255,255,255,0.4)",fontSize:11,fontWeight:600}}>Bewerk</button>
<button onClick={()=>setDelC(e.id)} style={{background:"rgba(239,68,68,0.1)",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:"#ef4444",fontSize:11,fontWeight:600}}>{"\u2715"}</button></div></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
<div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginBottom:4,fontWeight:600}}>BEDRAG</div>
<div className="mono" style={{fontSize:13,fontWeight:800}}>{"\u20ac"}{fN(e.total)}</div></div>
<div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginBottom:4,fontWeight:600}}>LITERS</div>
<div className="mono" style={{fontSize:13,fontWeight:800}}>{fN(e.liters,1)}</div></div>
<div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginBottom:4,fontWeight:600}}>KM/L</div>
<div className="mono" style={{fontSize:13,fontWeight:800,color:e.kpl?"#22d3ee":"rgba(255,255,255,0.2)"}}>{e.kpl?fN(e.kpl,1):"\u2013"}</div></div>
<div style={{background:"rgba(34,211,238,0.04)",borderRadius:10,padding:"10px 6px",textAlign:"center",border:"1px solid rgba(34,211,238,0.08)"}}>
<div style={{fontSize:9,color:"rgba(56,189,248,0.6)",marginBottom:4,fontWeight:600}}>1 OP</div>
<div className="mono" style={{fontSize:13,fontWeight:800,color:e.kpl?"#38bdf8":"rgba(255,255,255,0.2)"}}>{e.kpl?fN(e.kpl,1):"\u2013"}</div></div></div>
{e.kmD!=null&&<div style={{marginTop:8,display:"flex",gap:14,fontSize:11,color:"rgba(255,255,255,0.35)"}}>
<span>{e.kmD.toLocaleString("nl-NL")} km</span>
<span>{"\u20ac"}{fN(e.cpk,3)}/km</span>
<span>{"\u20ac"}{fN(e.ppl,3)}/L</span></div>}
</>}</div>))}
</div>}
</div>}

</div>

<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(10,15,26,0.98)",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",padding:"8px 0 max(8px, env(safe-area-inset-bottom))"}}>
{[["dashboard","Dashboard","\uD83D\uDCCA"],["add","Tanken","\u26FD"],["history","Geschiedenis","\uD83D\uDCCB"]].map(([id,label,icon])=>(
<button key={id} onClick={()=>{setTab(id);if(id==="add"){setEditId(null);rf()}}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 0",background:"none",border:"none",cursor:"pointer",color:tab===id?"#22d3ee":"rgba(255,255,255,0.3)"}}>
<span style={{fontSize:18}}>{icon}</span>
<span style={{fontSize:10,fontWeight:tab===id?700:500}}>{label}</span>
{tab===id&&<div style={{width:20,height:2,background:"#22d3ee",borderRadius:2,marginTop:2}}/>}
</button>))}
</div>
</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
