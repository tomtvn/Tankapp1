const fD=(d)=>new Date(d).toLocaleDateString("nl-NL",{day:"2-digit",month:"short",year:"numeric"});
const fN=(n,dec=2)=>{if(n==null||isNaN(n))return"\u2013";return n.toLocaleString("nl-NL",{minimumFractionDigits:dec,maximumFractionDigits:dec})};

const Ic={
fuel:(p)=><svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth={p.w||2} strokeLinecap="round" strokeLinejoin="round"><path d="M3 22V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v17"/><path d="M13 10h2a2 2 0 0 1 2 2v3a2 2 0 0 0 2 2 2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 6"/><path d="M3 22h10"/><path d="M7 2v4"/><path d="M10 2v4"/></svg>,
plus:(p)=><svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth={p.w||2} strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
chart:(p)=><svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth={p.w||2} strokeLinecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
clock:(p)=><svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth={p.w||2} strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
dl:(p)=><svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth={p.w||2} strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
trash:(p)=><svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth={p.w||2} strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
up:(p)=><svg width={p.s||12} height={p.s||12} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
dn:(p)=><svg width={p.s||12} height={p.s||12} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>,
back:(p)=><svg width={p.s||24} height={p.s||24} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>,
gauge:(p)=><svg width={p.s||16} height={p.s||16} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round"><path d="M12 22c5.5 0 10-4.5 10-10S17.5 2 12 2 2 6.5 2 12s4.5 10 10 10z"/><path d="m14.3 8 5.7 10"/></svg>,
euro:(p)=><svg width={p.s||16} height={p.s||16} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round"><path d="M4 10h12M4 14h9M17 5a7 7 0 0 1 0 14"/></svg>,
drop:(p)=><svg width={p.s||16} height={p.s||16} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round"><path d="M12 22a7 7 0 0 0 7-7c0-3.9-7-13-7-13S5 11.1 5 15a7 7 0 0 0 7 7z"/></svg>,
road:(p)=><svg width={p.s||16} height={p.s||16} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>,
};

const Stat=({icon,label,value,unit,trend,color="#22d3ee"})=>{
const I=Ic[icon];
return(<div style={{background:"linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"16px 18px",display:"flex",flexDirection:"column",gap:8,position:"relative",overflow:"hidden"}}>
<div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:color+"08"}}/>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<div style={{width:32,height:32,borderRadius:10,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center"}}>{I&&<I s={16} c={color}/>}</div>
<span style={{fontSize:11,color:"rgba(255,255,255,0.45)",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>{label}</span></div>
<div style={{display:"flex",alignItems:"baseline",gap:4}}>
<span style={{fontSize:26,fontWeight:800,color:"#f1f5f9",fontFamily:"'JetBrains Mono',monospace"}}>{value}</span>
<span style={{fontSize:12,color:"rgba(255,255,255,0.35)",fontWeight:500}}>{unit}</span></div>
{trend!=null&&<div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:trend>=0?"#4ade80":"#f87171"}}>
{trend>=0?<Ic.up c="#4ade80"/>:<Ic.dn c="#f87171"/>}
<span>{trend>=0?"+":""}{fN(trend,1)}% vs vorige</span></div>}
</div>);};

const TabBtn=({active,icon,label,onClick})=>{
const I=Ic[icon];const ac=active?"#22d3ee":"rgba(255,255,255,0.3)";
return(<button onClick={onClick} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 0",background:"none",border:"none",cursor:"pointer",color:ac,position:"relative"}}>
{I&&<I s={20} c={ac} w={active?2.5:1.5}/>}
<span style={{fontSize:10,fontWeight:active?700:500,letterSpacing:0.5}}>{label}</span>
{active&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:2,background:"#22d3ee",borderRadius:2}}/>}
</button>);};

function App(){
const[entries,setEntries]=useState([]);
const[tab,setTab]=useState("dashboard");
const[editId,setEditId]=useState(null);
const[form,setForm]=useState({date:new Date().toISOString().split("T")[0],km:"",total:"",ppl:""});
const[delC,setDelC]=useState(null);
const[toast,setToast]=useState(null);
const[ready,setReady]=useState(false);

useEffect(()=>{
try{const s=localStorage.getItem(SK);if(s){const p=JSON.parse(s);if(p.length>0){setEntries(p);setReady(true);return;}}}catch(e){}
setEntries(SEED);try{localStorage.setItem(SK,JSON.stringify(SEED))}catch(e){}
setReady(true);
},[]);

const save=useCallback((ne)=>{setEntries(ne);try{localStorage.setItem(SK,JSON.stringify(ne))}catch(e){}},[]);
const msg=(m)=>{setToast(m);setTimeout(()=>setToast(null),2500)};
const resetForm=()=>setForm({date:new Date().toISOString().split("T")[0],km:"",total:"",ppl:""});

const sorted=[...entries].sort((a,b)=>a.km-b.km);
const computed=sorted.map((e,i)=>{
const liters=e.total/e.ppl;const prev=i>0?sorted[i-1].km:null;
const kmD=prev!=null?e.km-prev:null;
const kpl=kmD!=null&&liters>0?kmD/liters:null;
const cpk=kmD!=null&&kmD>0?e.total/kmD:null;
return{...e,liters,kmD,kpl,cpk};});
const ws=computed.filter(e=>e.kpl!=null);

const st={
totKm:sorted.length>=2?sorted[sorted.length-1].km-sorted[0].km:0,
totCost:entries.reduce((s,e)=>s+e.total,0),
totL:computed.reduce((s,e)=>s+e.liters,0),
avgKpl:ws.length>0?ws.reduce((s,e)=>s+e.kpl,0)/ws.length:null,
avgCpk:ws.length>0?ws.reduce((s,e)=>s+e.cpk,0)/ws.length:null,
avgLp100:ws.length>0?ws.reduce((s,e)=>s+(100/e.kpl),0)/ws.length:null,
lLp100:ws.length>0?100/ws[ws.length-1].kpl:null,
pLp100:ws.length>1?100/ws[ws.length-2].kpl:null,
lKpl:ws.length>0?ws[ws.length-1].kpl:null,
pKpl:ws.length>1?ws[ws.length-2].kpl:null,
lCpk:ws.length>0?ws[ws.length-1].cpk:null,
pCpk:ws.length>1?ws[ws.length-2].cpk:null,
};
const trK=st.pKpl?((st.lKpl-st.pKpl)/st.pKpl)*100:null;
const trC=st.pCpk?((st.lCpk-st.pCpk)/st.pCpk)*100:null;
const trL=st.pLp100?((st.lLp100-st.pLp100)/st.pLp100)*100:null;
const cd=ws.map(e=>({date:fD(e.date),"km/l":Math.round(e.kpl*100)/100,"\u20ac/km":Math.round(e.cpk*100)/100,"\u20ac/l":e.ppl}));

const submit=()=>{
const km=parseFloat(form.km),total=parseFloat(form.total),ppl=parseFloat(form.ppl);
if(!form.date||isNaN(km)||isNaN(total)||isNaN(ppl)||ppl<=0){msg("Vul alle velden correct in");return;}
const entry={id:editId||Date.now().toString(),date:form.date,km,total,ppl};
if(editId){save(entries.map(e=>e.id===editId?entry:e));msg("Bijgewerkt \u2713")}
else{save([...entries,entry]);msg("Opgeslagen \u2713")}
resetForm();setEditId(null);setTab("dashboard");};

const del=(id)=>{save(entries.filter(e=>e.id!==id));setDelC(null);msg("Verwijderd \u2713")};
const edit=(e)=>{setForm({date:e.date,km:e.km.toString(),total:e.total.toString(),ppl:e.ppl.toString()});setEditId(e.id);setTab("add")};

const csv=()=>{
const h="Datum;Kilometerstand;Totaal;Prijs/liter;Liters;Km gereden;Km/liter;Euro/km\n";
const r=computed.map(e=>[e.date,e.km,fN(e.total),fN(e.ppl),fN(e.liters),e.kmD!=null?e.kmD:"",e.kpl?fN(e.kpl):"",e.cpk?fN(e.cpk,3):""].join(";")).join("\n");
const b=new Blob([h+r],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(b);
a.download="brandstof-"+new Date().toISOString().split("T")[0]+".csv";a.click();msg("CSV ge\u00ebxporteerd \u2713");};

const iS={width:"100%",padding:"14px 16px",background:"rgba(15,23,42,0.8)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,color:"#f1f5f9",fontSize:16,fontFamily:"'JetBrains Mono',monospace",outline:"none",boxSizing:"border-box"};
const ttS={background:"#1e293b",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,fontSize:12,color:"#f1f5f9"};

if(!ready)return <div id="loading">\u26FD FuelTrack laden...</div>;

return(
<div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0a0f1a 0%,#0f172a 50%,#0a0f1a 100%)",fontFamily:"'DM Sans',-apple-system,sans-serif",color:"#f1f5f9",maxWidth:480,margin:"0 auto",position:"relative",paddingBottom:80}}>

{toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"rgba(15,23,42,0.95)",border:"1px solid rgba(34,211,238,0.3)",borderRadius:12,padding:"12px 24px",zIndex:100,fontSize:14,fontWeight:600,color:"#22d3ee",animation:"fadeIn 0.2s",backdropFilter:"blur(10px)"}}>{toast}</div>}

<div style={{padding:"20px 20px 16px",background:"linear-gradient(180deg,rgba(10,15,26,1) 0%,rgba(10,15,26,0) 100%)",position:"sticky",top:0,zIndex:50}}>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#22d3ee,#0ea5e9)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 15px rgba(34,211,238,0.25)"}}><Ic.fuel s={18} c="#0a0f1a" w={2.5}/></div>
<div><div style={{fontSize:18,fontWeight:800,letterSpacing:-0.5}}>FuelTrack</div>
<div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:500,letterSpacing:1}}>{entries.length} TANKBEURT{entries.length!==1?"EN":""}</div></div></div>
{entries.length>0&&<button onClick={csv} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,color:"rgba(255,255,255,0.5)",fontSize:11,fontWeight:600}}><Ic.dl c="rgba(255,255,255,0.5)"/> CSV</button>}
</div></div>

<div style={{padding:"0 20px 20px"}}>

{tab==="dashboard"&&<div style={{animation:"fadeIn 0.3s"}}>
{entries.length===0?
<div style={{textAlign:"center",padding:"60px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
<div style={{width:80,height:80,borderRadius:24,background:"rgba(34,211,238,0.08)",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic.fuel s={36} c="#22d3ee" w={1.5}/></div>
<div style={{fontSize:20,fontWeight:700}}>Welkom bij FuelTrack</div>
<div style={{fontSize:14,color:"rgba(255,255,255,0.4)",lineHeight:1.6,maxWidth:280}}>Registreer je eerste tankbeurt.</div>
<button onClick={()=>setTab("add")} style={{background:"linear-gradient(135deg,#22d3ee,#0ea5e9)",border:"none",borderRadius:14,padding:"14px 28px",color:"#0a0f1a",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:8}}>Eerste tankbeurt</button></div>
:<>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
<Stat icon="gauge" label="Gem. km/l" value={st.avgKpl?fN(st.avgKpl,1):"\u2013"} unit="km/l" trend={trK} color="#22d3ee"/>
<Stat icon="euro" label="Gem. \u20ac/km" value={st.avgCpk?fN(st.avgCpk,3):"\u2013"} unit="\u20ac/km" trend={trC!=null?-trC:null} color="#a78bfa"/>
<Stat icon="drop" label="Verbruik" value={st.avgLp100?fN(st.avgLp100,1):"\u2013"} unit="l/100km" trend={trL!=null?-trL:null} color="#f472b6"/>
<Stat icon="fuel" label="1 op" value={st.avgKpl?fN(st.avgKpl,1):"\u2013"} unit="km" color="#38bdf8"/>
<Stat icon="road" label="Totaal km" value={st.totKm>0?fN(st.totKm,0):"\u2013"} unit="km" color="#4ade80"/>
<Stat icon="drop" label="Totaal liter" value={fN(st.totL,0)} unit="L" color="#fb923c"/>
</div>

<div style={{background:"linear-gradient(135deg,rgba(34,211,238,0.12),rgba(139,92,246,0.08))",border:"1px solid rgba(34,211,238,0.15)",borderRadius:16,padding:"16px 20px",marginBottom:24,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{fontSize:13,color:"rgba(255,255,255,0.5)",fontWeight:600}}>Totaal uitgegeven</span>
<span style={{fontSize:24,fontWeight:800,fontFamily:"'JetBrains Mono',monospace"}}>{"\u20ac"}{fN(st.totCost)}</span></div>

{cd.length>=2&&<>
<div style={{marginBottom:24}}>
<div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.5)",marginBottom:12,letterSpacing:0.5}}>VERBRUIK (KM/L)</div>
<div style={{background:"linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"16px 8px 8px 0"}}>
<ResponsiveContainer width="100%" height={180}><AreaChart data={cd}>
<defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#22d3ee" stopOpacity={0.3}/><stop offset="100%" stopColor="#22d3ee" stopOpacity={0}/></linearGradient></defs>
<CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
<XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
<YAxis tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false} width={35}/>
<Tooltip contentStyle={ttS}/><Area type="monotone" dataKey="km/l" stroke="#22d3ee" strokeWidth={2.5} fill="url(#g1)" dot={{r:3,fill:"#22d3ee",stroke:"#0a0f1a",strokeWidth:2}}/>
</AreaChart></ResponsiveContainer></div></div>

<div style={{marginBottom:24}}>
<div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.5)",marginBottom:12,letterSpacing:0.5}}>KOSTEN ({"\u20ac"}/KM)</div>
<div style={{background:"linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"16px 8px 8px 0"}}>
<ResponsiveContainer width="100%" height={180}><AreaChart data={cd}>
<defs><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#a78bfa" stopOpacity={0.3}/><stop offset="100%" stopColor="#a78bfa" stopOpacity={0}/></linearGradient></defs>
<CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
<XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
<YAxis tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false} width={35}/>
<Tooltip contentStyle={ttS}/><Area type="monotone" dataKey={"\u20ac/km"} stroke="#a78bfa" strokeWidth={2.5} fill="url(#g2)" dot={{r:3,fill:"#a78bfa",stroke:"#0a0f1a",strokeWidth:2}}/>
</AreaChart></ResponsiveContainer></div></div>

<div style={{marginBottom:24}}>
<div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.5)",marginBottom:12,letterSpacing:0.5}}>BRANDSTOFPRIJS ({"\u20ac"}/L)</div>
<div style={{background:"linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"16px 8px 8px 0"}}>
<ResponsiveContainer width="100%" height={160}><BarChart data={cd}>
<CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
<XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
<YAxis tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false} width={35} domain={["auto","auto"]}/>
<Tooltip contentStyle={ttS}/><Bar dataKey={"\u20ac/l"} fill="#fb923c" radius={[6,6,0,0]}/>
</BarChart></ResponsiveContainer></div></div>
</>}
</>}
</div>}

{tab==="add"&&<div style={{animation:"slideUp 0.3s"}}>
<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
{editId&&<button onClick={()=>{setEditId(null);resetForm();setTab("history")}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.4)",padding:4}}><Ic.back/></button>}
<div style={{fontSize:20,fontWeight:800}}>{editId?"Bewerken":"Nieuwe tankbeurt"}</div></div>
<div style={{display:"flex",flexDirection:"column",gap:16}}>
<div><label style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.4)",marginBottom:6,display:"block",letterSpacing:0.5}}>DATUM</label>
<input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.4)",marginBottom:6,display:"block",letterSpacing:0.5}}>KILOMETERSTAND</label>
<input type="number" inputMode="numeric" placeholder="bijv. 45230" value={form.km} onChange={e=>setForm({...form,km:e.target.value})} style={iS}/></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.4)",marginBottom:6,display:"block",letterSpacing:0.5}}>TOTAAL ({"\u20ac"})</label>
<input type="number" inputMode="decimal" step="0.01" placeholder="65.00" value={form.total} onChange={e=>setForm({...form,total:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.4)",marginBottom:6,display:"block",letterSpacing:0.5}}>PRIJS/LITER ({"\u20ac"})</label>
<input type="number" inputMode="decimal" step="0.001" placeholder="1.899" value={form.ppl} onChange={e=>setForm({...form,ppl:e.target.value})} style={iS}/></div></div>
{form.total&&form.ppl&&parseFloat(form.ppl)>0&&<div style={{background:"rgba(34,211,238,0.06)",border:"1px solid rgba(34,211,238,0.15)",borderRadius:12,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{fontSize:13,color:"rgba(255,255,255,0.5)",fontWeight:500}}>Berekende liters</span>
<span style={{fontSize:20,fontWeight:800,color:"#22d3ee",fontFamily:"'JetBrains Mono',monospace"}}>{fN(parseFloat(form.total)/parseFloat(form.ppl),1)} L</span></div>}
<button onClick={submit} style={{background:"linear-gradient(135deg,#22d3ee,#0ea5e9)",border:"none",borderRadius:14,padding:"16px",color:"#0a0f1a",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:8,width:"100%"}}>{editId?"Opslaan":"Tankbeurt registreren"}</button>
</div></div>}

{tab==="history"&&<div style={{animation:"fadeIn 0.3s"}}>
<div style={{fontSize:20,fontWeight:800,marginBottom:20}}>Geschiedenis</div>
{computed.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.3)"}}>Nog geen tankbeurten</div>
:<div style={{display:"flex",flexDirection:"column",gap:10}}>
{[...computed].reverse().map(e=>(
<div key={e.id} className="entry-row" style={{background:"linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"16px 18px"}}>
{delC===e.id?
<div style={{display:"flex",flexDirection:"column",gap:12,alignItems:"center",padding:"8px 0"}}>
<span style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>Verwijderen?</span>
<div style={{display:"flex",gap:10}}>
<button onClick={()=>del(e.id)} style={{background:"#ef4444",border:"none",borderRadius:10,padding:"10px 24px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Ja</button>
<button onClick={()=>setDelC(null)} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,padding:"10px 24px",color:"rgba(255,255,255,0.6)",fontSize:13,fontWeight:600,cursor:"pointer"}}>Nee</button></div></div>
:<>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
<div><div style={{fontSize:15,fontWeight:700}}>{fD(e.date)}</div>
<div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{e.km.toLocaleString("nl-NL")} km</div></div>
<div style={{display:"flex",gap:6}}>
<button onClick={()=>edit(e)} style={{background:"rgba(255,255,255,0.05)",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:"rgba(255,255,255,0.4)",fontSize:11,fontWeight:600}}>Bewerk</button>
<button onClick={()=>setDelC(e.id)} style={{background:"rgba(239,68,68,0.1)",border:"none",borderRadius:8,padding:"6px 8px",cursor:"pointer",color:"#ef4444"}}><Ic.trash c="#ef4444"/></button></div></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
<div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginBottom:4,fontWeight:600}}>BEDRAG</div>
<div style={{fontSize:14,fontWeight:800,fontFamily:"'JetBrains Mono',monospace"}}>{"\u20ac"}{fN(e.total)}</div></div>
<div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginBottom:4,fontWeight:600}}>LITERS</div>
<div style={{fontSize:14,fontWeight:800,fontFamily:"'JetBrains Mono',monospace"}}>{fN(e.liters,1)}</div></div>
<div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginBottom:4,fontWeight:600}}>KM/L</div>
<div style={{fontSize:14,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:e.kpl?"#22d3ee":"rgba(255,255,255,0.2)"}}>{e.kpl?fN(e.kpl,1):"\u2013"}</div></div>
<div style={{background:"rgba(34,211,238,0.04)",borderRadius:10,padding:"10px 8px",textAlign:"center",border:"1px solid rgba(34,211,238,0.08)"}}>
<div style={{fontSize:9,color:"rgba(56,189,248,0.6)",marginBottom:4,fontWeight:600}}>1 OP</div>
<div style={{fontSize:14,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:e.kpl?"#38bdf8":"rgba(255,255,255,0.2)"}}>{e.kpl?fN(e.kpl,1):"\u2013"}</div></div></div>
{e.kmD!=null&&<div style={{marginTop:8,display:"flex",gap:16,fontSize:11,color:"rgba(255,255,255,0.35)"}}>
<span>{e.kmD.toLocaleString("nl-NL")} km gereden</span>
<span>{"\u20ac"}{fN(e.cpk,3)}/km</span>
<span>{"\u20ac"}{fN(e.ppl,3)}/L</span></div>}
</>}
</div>))}
</div>}
</div>}

</div>

<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"linear-gradient(180deg,rgba(10,15,26,0.9),rgba(10,15,26,0.98))",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",padding:"4px 0 env(safe-area-inset-bottom, 8px)"}}>
<TabBtn active={tab==="dashboard"} icon="chart" label="Dashboard" onClick={()=>setTab("dashboard")}/>
<TabBtn active={tab==="add"} icon="plus" label="Tanken" onClick={()=>{setTab("add");setEditId(null);resetForm()}}/>
<TabBtn active={tab==="history"} icon="clock" label="Geschiedenis" onClick={()=>setTab("history")}/>
</div>
</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
