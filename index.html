function FuelTracker() {
const [entries, setEntries] = useState([]);
const [tab, setTab] = useState(“dashboard”);
const [loading, setLoading] = useState(true);
const [editId, setEditId] = useState(null);
const [form, setForm] = useState({ date: new Date().toISOString().split(“T”)[0], km: “”, total: “”, ppl: “” });
const [deleteConfirm, setDeleteConfirm] = useState(null);
const [toast, setToast] = useState(null);

useEffect(() => {
try {
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
const parsed = JSON.parse(saved);
if (parsed.length > 0) { setEntries(parsed); setLoading(false); return; }
}
} catch (e) {}
setEntries(SEED_DATA);
try { localStorage.setItem(STORAGE_KEY, JSON.stringify(SEED_DATA)); } catch(e) {}
setLoading(false);
}, []);

const saveEntries = useCallback((newEntries) => {
setEntries(newEntries);
try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newEntries)); } catch (e) {}
}, []);

const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

const sorted = […entries].sort((a, b) => a.km - b.km);
const computed = sorted.map((entry, i) => {
const liters = entry.total / entry.ppl;
const prevKm = i > 0 ? sorted[i - 1].km : null;
const kmDriven = prevKm != null ? entry.km - prevKm : null;
const kmPerLiter = kmDriven != null && liters > 0 ? kmDriven / liters : null;
const costPerKm = kmDriven != null && kmDriven > 0 ? entry.total / kmDriven : null;
return { …entry, liters, kmDriven, kmPerLiter, costPerKm };
});
const withStats = computed.filter(e => e.kmPerLiter != null);

const stats = {
totalKm: sorted.length >= 2 ? sorted[sorted.length - 1].km - sorted[0].km : 0,
totalCost: entries.reduce((s, e) => s + e.total, 0),
totalLiters: computed.reduce((s, e) => s + e.liters, 0),
avgKmPerLiter: withStats.length > 0 ? withStats.reduce((s, e) => s + e.kmPerLiter, 0) / withStats.length : null,
avgCostPerKm: withStats.length > 0 ? withStats.reduce((s, e) => s + e.costPerKm, 0) / withStats.length : null,
avgLitersPer100: withStats.length > 0 ? withStats.reduce((s, e) => s + (100 / e.kmPerLiter), 0) / withStats.length : null,
lastLitersPer100: withStats.length > 0 ? 100 / withStats[withStats.length - 1].kmPerLiter : null,
prevLitersPer100: withStats.length > 1 ? 100 / withStats[withStats.length - 2].kmPerLiter : null,
lastKmPerLiter: withStats.length > 0 ? withStats[withStats.length - 1].kmPerLiter : null,
prevKmPerLiter: withStats.length > 1 ? withStats[withStats.length - 2].kmPerLiter : null,
lastCostPerKm: withStats.length > 0 ? withStats[withStats.length - 1].costPerKm : null,
prevCostPerKm: withStats.length > 1 ? withStats[withStats.length - 2].costPerKm : null,
};

const trendKpl = stats.prevKmPerLiter ? ((stats.lastKmPerLiter - stats.prevKmPerLiter) / stats.prevKmPerLiter) * 100 : null;
const trendCpk = stats.prevCostPerKm ? ((stats.lastCostPerKm - stats.prevCostPerKm) / stats.prevCostPerKm) * 100 : null;
const trendLp100 = stats.prevLitersPer100 ? ((stats.lastLitersPer100 - stats.prevLitersPer100) / stats.prevLitersPer100) * 100 : null;

const chartData = withStats.map(e => ({
date: formatDate(e.date),
“km/l”: Math.round(e.kmPerLiter * 100) / 100,
“€/km”: Math.round(e.costPerKm * 100) / 100,
“€/l”: e.ppl,
liters: Math.round(e.liters * 10) / 10,
}));

const handleSubmit = () => {
const km = parseFloat(form.km); const total = parseFloat(form.total); const ppl = parseFloat(form.ppl);
if (!form.date || isNaN(km) || isNaN(total) || isNaN(ppl) || ppl <= 0) { showToast(“Vul alle velden correct in”); return; }
const entry = { id: editId || Date.now().toString(), date: form.date, km, total, ppl };
let ne;
if (editId) { ne = entries.map(e => e.id === editId ? entry : e); showToast(“Tankbeurt bijgewerkt ✓”); }
else { ne = […entries, entry]; showToast(“Tankbeurt opgeslagen ✓”); }
saveEntries(ne);
setForm({ date: new Date().toISOString().split(“T”)[0], km: “”, total: “”, ppl: “” });
setEditId(null); setTab(“dashboard”);
};
const handleDelete = (id) => { saveEntries(entries.filter(e => e.id !== id)); setDeleteConfirm(null); showToast(“Verwijderd ✓”); };
const handleEdit = (entry) => { setForm({ date: entry.date, km: entry.km.toString(), total: entry.total.toString(), ppl: entry.ppl.toString() }); setEditId(entry.id); setTab(“add”); };
const exportCSV = () => {
const header = “Datum;Kilometerstand;Totaal (€);Prijs/liter (€);Liters;Km gereden;Km/liter;€/km\n”;
const rows = computed.map(e => `${e.date};${e.km};${formatNum(e.total)};${formatNum(e.ppl)};${formatNum(e.liters)};${e.kmDriven ?? ""};${e.kmPerLiter ? formatNum(e.kmPerLiter) : ""};${e.costPerKm ? formatNum(e.costPerKm, 3) : ""}`).join(”\n”);
const blob = new Blob([header + rows], { type: “text/csv;charset=utf-8” });
const a = document.createElement(“a”); a.href = URL.createObjectURL(blob);
a.download = `brandstof-export-${new Date().toISOString().split("T")[0]}.csv`; a.click();
showToast(“CSV geëxporteerd ✓”);
};

        </div>

      {entries.length > 0 && <button onClick={exportCSV} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "8px 12px", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, color: "rgba(255,255,255,0.5)", fontSize: 11, fontWeight: 600 }}><Icons.download size={14} color="rgba(255,255,255,0.5)" /> CSV</button>}
    </div>
  </div>

  <div style={{ padding: "0 20px 20px" }}>
    {/* DASHBOARD */}
    {tab === "dashboard" && (
      <div style={{ animation: "fadeIn 0.3s ease-out" }}>
        {entries.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 20px", display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
            <div style={{ width: 80, height: 80, borderRadius: 24, background: "rgba(34,211,238,0.08)", display: "flex", alignItems: "center", justifyContent: "center" }}><Icons.fuel size={36} color="#22d3ee" sw={1.5} /></div>
            <div style={{ fontSize: 20, fontWeight: 700 }}>Welkom bij FuelTrack</div>
            <div style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", lineHeight: 1.6, maxWidth: 280 }}>Registreer je eerste tankbeurt om inzicht te krijgen in je brandstofverbruik en kosten.</div>
            <button onClick={() => setTab("add")} style={{ background: "linear-gradient(135deg, #22d3ee, #0ea5e9)", border: "none", borderRadius: 14, padding: "14px 28px", color: "#0a0f1a", fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 8, display: "flex", alignItems: "center", gap: 8 }}><Icons.plus size={18} color="#0a0f1a" /> Eerste tankbeurt</button>
          </div>
        ) : (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
              <StatCard icon="gauge" label="Gem. km/l" value={stats.avgKmPerLiter ? formatNum(stats.avgKmPerLiter, 1) : "–"} unit="km/l" trend={trendKpl} color="#22d3ee" />
              <StatCard icon="dollar" label="Gem. €/km" value={stats.avgCostPerKm ? formatNum(stats.avgCostPerKm, 3) : "–"} unit="€/km" trend={trendCpk != null ? -trendCpk : null} color="#a78bfa" />
              <StatCard icon="droplets" label="Verbruik" value={stats.avgLitersPer100 ? formatNum(stats.avgLitersPer100, 1) : "–"} unit="l/100km" trend={trendLp100 != null ? -trendLp100 : null} color="#f472b6" />
              <StatCard icon="fuel" label="1 op" value={stats.avgKmPerLiter ? formatNum(stats.avgKmPerLiter, 1) : "–"} unit="km" color="#38bdf8" />
              <StatCard icon="route" label="Totaal km" value={stats.totalKm > 0 ? formatNum(stats.totalKm, 0) : "–"} unit="km" color="#4ade80" />
              <StatCard icon="droplets" label="Totaal liter" value={formatNum(stats.totalLiters, 0)} unit="L" color="#fb923c" />
            </div>

            <div style={{ background: "linear-gradient(135deg, rgba(34,211,238,0.12), rgba(139,92,246,0.08))", border: "1px solid rgba(34,211,238,0.15)", borderRadius: 16, padding: "16px 20px", marginBottom: 24, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", fontWeight: 600 }}>Totaal uitgegeven</span>
              <span style={{ fontSize: 24, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>€{formatNum(stats.totalCost)}</span>
            </div>

            {chartData.length >= 2 && (<>
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "rgba(255,255,255,0.5)", marginBottom: 12, letterSpacing: 0.5 }}>VERBRUIK (KM/L)</div>
                <div style={{ background: "linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.9))", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: "16px 8px 8px 0" }}>
                  <ResponsiveContainer width="100%" height={180}>
                    <AreaChart data={chartData}>
                      <defs><linearGradient id="kplGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#22d3ee" stopOpacity={0.3} /><stop offset="100%" stopColor="#22d3ee" stopOpacity={0} /></linearGradient></defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                      <XAxis dataKey="date" tick={{ fill: "rgba(255,255,255,0.3)", fontSize: 10 }} axisLine={false} tickLine={false} />
                      <YAxis tick={{ fill: "rgba(255,255,255,0.3)", fontSize: 10 }} axisLine={false} tickLine={false} width={35} />
                      <Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, fontSize: 12, color: "#f1f5f9" }} />
                      <Area type="monotone" dataKey="km/l" stroke="#22d3ee" strokeWidth={2.5} fill="url(#kplGrad)" dot={{ r: 4, fill: "#22d3ee", stroke: "#0a0f1a", strokeWidth: 2 }} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
              </div>
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "rgba(255,255,255,0.5)", marginBottom: 12, letterSpacing: 0.5 }}>KOSTEN (€/KM)</div>
                <div style={{ background: "linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.9))", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: "16px 8px 8px 0" }}>
                  <ResponsiveContainer width="100%" height={180}>
                    <AreaChart data={chartData}>
                      <defs><linearGradient id="cpkGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#a78bfa" stopOpacity={0.3} /><stop offset="100%" stopColor="#a78bfa" stopOpacity={0} /></linearGradient></defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                      <XAxis dataKey="date" tick={{ fill: "rgba(255,255,255,0.3)", fontSize: 10 }} axisLine={false} tickLine={false} />
                      <YAxis tick={{ fill: "rgba(255,255,255,0.3)", fontSize: 10 }} axisLine={false} tickLine={false} width={35} />
                      <Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, fontSize: 12, color: "#f1f5f9" }} />
                      <Area type="monotone" dataKey="€/km" stroke="#a78bfa" strokeWidth={2.5} fill="url(#cpkGrad)" dot={{ r: 4, fill: "#a78bfa", stroke: "#0a0f1a", strokeWidth: 2 }} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
              </div>
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "rgba(255,255,255,0.5)", marginBottom: 12, letterSpacing: 0.5 }}>BRANDSTOFPRIJS (€/L)</div>
                <div style={{ background: "linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.9))", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: "16px 8px 8px 0" }}>
                  <ResponsiveContainer width="100%" height={160}>
                    <BarChart data={chartData}>
                      <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                      <XAxis dataKey="date" tick={{ fill: "rgba(255,255,255,0.3)", fontSize: 10 }} axisLine={false} tickLine={false} />
                      <YAxis tick={{ fill: "rgba(255,255,255,0.3)", fontSize: 10 }} axisLine={false} tickLine={false} width={35} domain={["auto", "auto"]} />
                      <Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, fontSize: 12, color: "#f1f5f9" }} />
                      <Bar dataKey="€/l" fill="#fb923c" radius={[6, 6, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </>)}
          </>
        )}
      </div>
    )}

    {/* ADD TAB */}
    {tab === "add" && (
      <div style={{ animation: "slideUp 0.3s ease-out" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
          {editId && <button onClick={() => { setEditId(null); setForm({ date: new Date().toISOString().split("T")[0], km: "", total: "", ppl: "" }); setTab("history"); }} style={{ background: "none", border: "none", cursor: "pointer", color: "rgba(255,255,255,0.4)", padding: 4 }}><Icons.back /></button>}
          <div style={{ fontSize: 20, fontWeight: 800 }}>{editId ? "Bewerken" : "Nieuwe tankbeurt"}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.4)", marginBottom: 6, display: "block", letterSpacing: 0.5 }}>DATUM</label>
            <input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} style={inputStyle} />
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.4)", marginBottom: 6, display: "block", letterSpacing: 0.5 }}>KILOMETERSTAND</label>
            <input type="number" inputMode="numeric" placeholder="bijv. 45230" value={form.km} onChange={e => setForm({ ...form, km: e.target.value })} style={inputStyle} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.4)", marginBottom: 6, display: "block", letterSpacing: 0.5 }}>TOTAAL (€)</label>
              <input type="number" inputMode="decimal" step="0.01" placeholder="65.00" value={form.total} onChange={e => setForm({ ...form, total: e.target.value })} style={inputStyle} />
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.4)", marginBottom: 6, display: "block", letterSpacing: 0.5 }}>PRIJS/LITER (€)</label>
              <input type="number" inputMode="decimal" step="0.001" placeholder="1.899" value={form.ppl} onChange={e => setForm({ ...form, ppl: e.target.value })} style={inputStyle} />
            </div>
          </div>
          {form.total && form.ppl && parseFloat(form.ppl) > 0 && (
            <div style={{ background: "rgba(34,211,238,0.06)", border: "1px solid rgba(34,211,238,0.15)", borderRadius: 12, padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", fontWeight: 500 }}>Berekende liters</span>
              <span style={{ fontSize: 20, fontWeight: 800, color: "#22d3ee", fontFamily: "'JetBrains Mono', monospace" }}>{formatNum(parseFloat(form.total) / parseFloat(form.ppl), 1)} L</span>
            </div>
          )}
          <button onClick={handleSubmit} style={{ background: "linear-gradient(135deg, #22d3ee, #0ea5e9)", border: "none", borderRadius: 14, padding: "16px", color: "#0a0f1a", fontSize: 16, fontWeight: 700, cursor: "pointer", marginTop: 8, width: "100%" }}>{editId ? "Opslaan" : "Tankbeurt registreren"}</button>
        </div>
      </div>
    )}

    {/* HISTORY TAB */}
    {tab === "history" && (
      <div style={{ animation: "fadeIn 0.3s ease-out" }}>
        <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 20 }}>Geschiedenis</div>
        {computed.length === 0 ? (
          <div style={{ textAlign: "center", padding: "40px 20px", color: "rgba(255,255,255,0.3)" }}>Nog geen tankbeurten geregistreerd</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {[...computed].reverse().map((entry) => (
              <div key={entry.id} className="entry-row" style={{ background: "linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.9))", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: "16px 18px", position: "relative", transition: "background 0.15s" }}>
                {deleteConfirm === entry.id ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 12, alignItems: "center", padding: "8px 0" }}>
                    <span style={{ fontSize: 13, color: "rgba(255,255,255,0.6)" }}>Verwijderen?</span>
                    <div style={{ display: "flex", gap: 10 }}>
                      <button onClick={() => handleDelete(entry.id)} style={{ background: "#ef4444", border: "none", borderRadius: 10, padding: "10px 24px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Ja, verwijder</button>
                      <button onClick={() => setDeleteConfirm(null)} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 10, padding: "10px 24px", color: "rgba(255,255,255,0.6)", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Annuleren</button>
                    </div>
                  </div>
                ) : (
                  <>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 700 }}>{formatDate(entry.date)}</div>
                        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginTop: 2, fontFamily: "'JetBrains Mono', monospace" }}>{entry.km.toLocaleString("nl-NL")} km</div>
                      </div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => handleEdit(entry)} style={{ background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: "rgba(255,255,255,0.4)", fontSize: 11, fontWeight: 600 }}>Bewerk</button>
                        <button onClick={() => setDeleteConfirm(entry.id)} style={{ background: "rgba(239,68,68,0.1)", border: "none", borderRadius: 8, padding: "6px 8px", cursor: "pointer", color: "#ef4444" }}><Icons.trash color="#ef4444" /></button>
                      </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
                      <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
                        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", marginBottom: 4, fontWeight: 600 }}>BEDRAG</div>
                        <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>€{formatNum(entry.total)}</div>
                      </div>
                      <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
                        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", marginBottom: 4, fontWeight: 600 }}>LITERS</div>
                        <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>{formatNum(entry.liters, 1)}</div>
                      </div>
                      <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
                        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", marginBottom: 4, fontWeight: 600 }}>KM/L</div>
                        <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: entry.kmPerLiter ? "#22d3ee" : "rgba(255,255,255,0.2)" }}>{entry.kmPerLiter ? formatNum(entry.kmPerLiter, 1) : "–"}</div>
                      </div>
                      <div style={{ background: "rgba(34,211,238,0.04)", borderRadius: 10, padding: "10px 8px", textAlign: "center", border: "1px solid rgba(34,211,238,0.08)" }}>
                        <div style={{ fontSize: 9, color: "rgba(56,189,248,0.6)", marginBottom: 4, fontWeight: 600 }}>1 OP</div>
                        <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: entry.kmPerLiter ? "#38bdf8" : "rgba(255,255,255,0.2)" }}>{entry.kmPerLiter ? formatNum(entry.kmPerLiter, 1) : "–"}</div>
                      </div>
                    </div>
                    {entry.kmDriven != null && (
                      <div style={{ marginTop: 8, display: "flex", gap: 16, fontSize: 11, color: "rgba(255,255,255,0.35)" }}>
                        <span>{entry.kmDriven.toLocaleString("nl-NL")} km gereden</span>
                        <span>€{formatNum(entry.costPerKm, 3)}/km</span>
                        <span>€{formatNum(entry.ppl, 3)}/L</span>
                      </div>
                    )}
                  </>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    )}
  </div>

  {/* Bottom Nav */}
  <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "linear-gradient(180deg, rgba(10,15,26,0.9), rgba(10,15,26,0.98))", backdropFilter: "blur(20px)", borderTop: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", padding: "4px 0 env(safe-area-inset-bottom, 8px)" }}>
    <TabButton active={tab === "dashboard"} icon="chart" label="Dashboard" onClick={() => setTab("dashboard")} />
    <TabButton active={tab === "add"} icon="plus" label="Tanken" onClick={() => { setTab("add"); setEditId(null); setForm({ date: new Date().toISOString().split("T")[0], km: "", total: "", ppl: "" }); }} />
    <TabButton active={tab === "history"} icon="clock" label="Geschiedenis" onClick={() => setTab("history")} />
  </div>
</div>
```

);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<FuelTracker />);
</script>
